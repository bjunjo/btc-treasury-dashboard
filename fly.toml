# fly.toml app configuration file generated for btc-treasury on 2026-03-29T23:18:09Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'btc-treasury'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  # Single-machine app: keep it running 24/7 to eliminate cold-start latency.
  # `min_machines_running=1` alone doesn't reliably prevent suspension on
  # single-machine apps, so we set `auto_stop_machines='off'` explicitly.
  # Trade-off: ~$3–4/mo for an always-on shared-cpu-1x:512MB vs unpredictable
  # 5–95s wake on idle. Worth it for a public dashboard.
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
