# fly.toml app configuration file generated for btc-treasury on 2026-03-29T23:18:09Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'btc-treasury'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  # 'suspend' keeps RAM/disk warm — wake is ~1-2s vs ~10-30s for 'stop'.
  # min_machines_running=1 alone doesn't reliably prevent suspension on a
  # single-machine app, so we use suspend to make cold starts tolerable.
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
